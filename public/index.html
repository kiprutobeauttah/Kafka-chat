<!DOCTYPE html>
<html>
<head>
  <title>Kafka Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login">
    <div id="login-form">
      <h2>Kafka Chat</h2>
      <p>Welcome! Please login or register to continue.</p>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <button id="login-btn" onclick="login()">Login</button>
      <button id="register-btn" onclick="register()">Register</button>
    </div>
  </div>

  <div id="container">
    <div id="sidebar">
      <div id="user-profile">
        <div class="profile-icon"></div>
        <div class="profile-info">
          <div class="profile-name"></div>
          <div class="profile-status">
            <span class="status-indicator"></span>
            <span>Secure Connection</span>
          </div>
        </div>
      </div>
      <h2>Available Users</h2>
      <div id="contacts">
        <!-- Users will be loaded dynamically -->
      </div>
    </div>

    <div id="chat-area">
      <div id="chat-header">
        <h3>Select a user to start secure chat</h3>
        <div id="credit">@kiprutobeauttah</div>
      </div>
      <div id="chat">
        <div class="info-message">
          <p>👥 Create more user accounts to test the chat functionality</p>
          <p>Select a user from the sidebar to begin secure messaging</p>
        </div>
      </div>
      <div id="message-input">
        <input id="msg" placeholder="Type an encrypted message..." />
        <button onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
