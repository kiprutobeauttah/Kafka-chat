<!DOCTYPE html>
<html>
<head>
  <title>Kafka Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login">
    <div id="login-form">
      <h2>Kafka Chat</h2>
      <p>Welcome! Please login or register to continue.</p>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <button id="login-btn" onclick="login()">Login</button>
      <button id="register-btn" onclick="register()">Register</button>
    </div>
  </div>

  <div id="container">
    <div id="left-nav">
      <div class="nav-logo">K</div>
      <div class="nav-item active" title="All Chats">
        <img src="/icons/message-circle.svg" alt="Chats" class="icon">
      </div>
      <div class="nav-item" title="Archive">
        <img src="/icons/archive.svg" alt="Archive" class="icon">
      </div>
      <div class="nav-spacer"></div>
      <div class="nav-logout" onclick="logout()" title="Logout">
        <img src="/icons/log-out.svg" alt="Logout" class="icon">
      </div>
    </div>

    <div id="sidebar">
      <div id="search-bar">
        <input type="text" placeholder="Search" id="search-input" />
      </div>
      <h2>All Chats</h2>
      <div id="contacts">
        <!-- Users will be loaded dynamically -->
      </div>
    </div>

    <div id="chat-area">
      <div id="chat-header">
        <div id="chat-header-left">
          <button class="mobile-menu-btn" onclick="toggleSidebar()" title="Menu">
            <img src="/icons/menu.svg" alt="Menu" class="icon">
          </button>
          <div class="chat-avatar" id="chat-avatar"></div>
          <h3 id="chat-title">Select a user to start secure chat</h3>
        </div>
        <div id="chat-header-right">
          <button onclick="openGroupInfo()" class="icon-btn" title="Group Info">
            <img src="/icons/info.svg" alt="Info" class="icon">
          </button>
          <div id="credit">@kiprutobeauttah</div>
        </div>
      </div>
      <div id="chat">
        <div class="info-message">
          <p>👥 Create more user accounts to test the chat functionality</p>
          <p>Select a user from the sidebar to begin secure messaging</p>
        </div>
      </div>
      <div id="message-input">
        <button class="attach-btn" title="Attach file">
          <img src="/icons/paperclip.svg" alt="Attach" class="icon">
        </button>
        <input id="msg" placeholder="Your message" />
        <button onclick="sendMsg()" title="Send message">
          <img src="/icons/send.svg" alt="Send" class="icon">
        </button>
      </div>
    </div>

    <div id="group-info" style="display: none;">
      <div id="group-info-header">
        <h3>Group Info</h3>
        <button class="close-btn" onclick="closeGroupInfo()">×</button>
      </div>
      <div id="group-info-content">
        <div class="group-section">
          <div class="group-section-title">2 MEMBERS</div>
          <div id="group-members">
            <!-- Members will be loaded dynamically -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
